<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Futsal Ledger</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2333cf8f'/><g transform='translate(4 4)' fill='none' stroke='%230b201a' stroke-width='2'><circle cx='12' cy='12' r='9'/><path d='M12 7l3.5 2.5-1.3 4.1h-4.4L8.5 9.5 12 7z' fill='%230b201a' stroke='none'/><path d='M12 3v4M3.5 9l3.5 1M20.5 9l-3.5 1M6 19l2-3M18 19l-2-3'/></g></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    /* Near-black neutrals, faintly tinted toward the brand green (never pure #000) */
    --bg:oklch(0.165 0.012 165);
    --surface:oklch(0.205 0.013 165);
    --surface-2:oklch(0.255 0.015 165);
    --surface-3:oklch(0.30 0.016 165);
    --fg:oklch(0.97 0.006 165);
    --text-dim:oklch(0.74 0.018 165);
    --text-dimmer:oklch(0.58 0.018 165);
    --border:oklch(1 0 0 / 0.07);
    --border-strong:oklch(1 0 0 / 0.14);
    /* Emerald carries identity + money semantics */
    --accent:oklch(0.74 0.165 158);
    --accent-press:oklch(0.66 0.155 158);
    --accent-soft:oklch(0.74 0.165 158 / 0.13);
    --on-accent:oklch(0.18 0.03 165);
    --danger:oklch(0.64 0.2 25);
    --danger-soft:oklch(0.64 0.2 25 / 0.13);
    --warning:oklch(0.78 0.14 78);
    /* Category hues (non-blue, money-forward) */
    --c-materials:#2DD4BF; --c-labor:#A3E635; --c-equipment:#A78BFA;
    --c-transport:#FBBF24; --c-advance:#FB7185; --c-misc:#94A3B8;
    --radius:15px; --radius-sm:10px;
    --shadow:0 14px 40px oklch(0.1 0.02 165 / 0.55);
    --ease:cubic-bezier(0.16,1,0.3,1);
    color-scheme:dark;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Open Sans',system-ui,sans-serif;background:var(--bg);color:var(--fg);
    -webkit-font-smoothing:antialiased;line-height:1.5;font-size:16px;
  }
  h1,h2,h3,h4{font-family:'Poppins',sans-serif;font-weight:600;line-height:1.25;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:16px}
  ::selection{background:var(--accent);color:var(--on-accent)}
  .tnum{font-variant-numeric:tabular-nums}

  /* ---------- Shell ---------- */
  .app{display:grid;grid-template-columns:236px 1fr;min-height:100dvh}
  .sidebar{background:oklch(0.185 0.013 165);border-right:1px solid var(--border);
    padding:22px 14px;display:flex;flex-direction:column;gap:6px;position:sticky;top:0;height:100dvh}
  .brand{display:flex;align-items:center;gap:11px;padding:6px 8px 20px}
  .brand .logo{width:38px;height:38px;border-radius:11px;background:var(--accent);
    display:grid;place-items:center;flex:none;box-shadow:0 6px 18px oklch(0.74 0.165 158 / 0.35)}
  .brand .logo svg{width:22px;height:22px;color:var(--on-accent)}
  .brand-name{font-family:'Poppins';font-weight:600;font-size:15px;line-height:1.1}
  .brand-sub{font-size:11px;color:var(--text-dim);font-weight:600;letter-spacing:.02em}
  .nav{display:flex;flex-direction:column;gap:3px;margin-top:2px}
  .nav button{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:var(--radius-sm);
    color:var(--text-dim);font-weight:600;font-size:14px;transition:background .18s var(--ease),color .18s;text-align:left;width:100%}
  .nav button svg{width:19px;height:19px;flex:none}
  .nav button:hover{background:var(--surface-2);color:var(--fg)}
  .nav button.active{background:var(--accent-soft);color:var(--fg)}
  .nav button.active svg{color:var(--accent)}
  .sidebar-foot{margin-top:auto;font-size:11px;color:var(--text-dimmer);padding:10px 8px;line-height:1.55}

  .main{display:flex;flex-direction:column;min-width:0}
  .topbar{position:sticky;top:0;z-index:30;background:oklch(0.165 0.012 165 / 0.85);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:14px 30px;display:flex;align-items:center;gap:16px}
  .topbar h2{font-size:19px}
  .topbar .spacer{flex:1}
  .content{padding:28px 30px 96px;max-width:1160px;width:100%;margin:0 auto}

  /* ---------- Buttons ---------- */
  .btn{position:relative;display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:10px 17px;border-radius:11px;font-weight:600;font-size:14px;letter-spacing:.01em;white-space:nowrap;
    border:1px solid transparent;touch-action:manipulation;-webkit-tap-highlight-color:transparent;
    transition:transform .18s var(--ease),box-shadow .22s var(--ease),background .2s,border-color .2s,filter .2s}
  .btn svg{width:17px;height:17px}
  .btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  /* Primary: emerald with a hairline top highlight + soft colored glow */
  .btn-primary{color:var(--on-accent);
    background:linear-gradient(180deg, oklch(0.79 0.165 158), var(--accent));
    box-shadow:0 1px 0 oklch(0.92 0.1 158 / .45) inset,
               0 6px 16px oklch(0.74 0.165 158 / .26),
               0 1px 2px oklch(0.12 0.02 165 / .4)}
  .btn-primary:hover{transform:translateY(-1px);filter:brightness(1.05);
    box-shadow:0 1px 0 oklch(0.92 0.1 158 / .5) inset,
               0 10px 26px oklch(0.74 0.165 158 / .4),
               0 1px 2px oklch(0.12 0.02 165 / .4)}
  .btn-primary:active{transform:translateY(0) scale(.975);filter:brightness(.97);
    box-shadow:0 1px 0 oklch(0.92 0.1 158 / .3) inset, 0 3px 9px oklch(0.74 0.165 158 / .3)}
  /* Ghost: raised dark surface with subtle top sheen */
  .btn-ghost{color:var(--fg);border-color:var(--border-strong);
    background:linear-gradient(180deg, var(--surface-2), oklch(0.225 0.013 165));
    box-shadow:0 1px 0 oklch(1 0 0 / .045) inset, 0 2px 6px oklch(0.1 0.02 165 / .3)}
  .btn-ghost:hover{transform:translateY(-1px);border-color:oklch(1 0 0 / .22);
    background:linear-gradient(180deg, var(--surface-3), var(--surface-2));
    box-shadow:0 1px 0 oklch(1 0 0 / .07) inset, 0 7px 18px oklch(0.1 0.02 165 / .42)}
  .btn-ghost:active{transform:translateY(0) scale(.975);box-shadow:0 1px 0 oklch(1 0 0 / .04) inset}
  /* Danger */
  .btn-danger{color:oklch(0.8 0.16 25);border-color:oklch(0.64 0.2 25 / .34);
    background:linear-gradient(180deg, oklch(0.64 0.2 25 / .2), oklch(0.64 0.2 25 / .1));
    box-shadow:0 1px 0 oklch(1 0 0 / .04) inset}
  .btn-danger:hover{transform:translateY(-1px);border-color:oklch(0.64 0.2 25 / .52);
    background:linear-gradient(180deg, oklch(0.64 0.2 25 / .28), oklch(0.64 0.2 25 / .16));
    box-shadow:0 7px 18px oklch(0.64 0.2 25 / .24)}
  .btn-danger:active{transform:translateY(0) scale(.975)}
  .btn-sm{padding:8px 13px;font-size:13px}
  .icon-btn{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;color:var(--text-dim);
    border:1px solid transparent;touch-action:manipulation;-webkit-tap-highlight-color:transparent;
    transition:background .18s,color .18s,border-color .18s,transform .16s var(--ease)}
  .icon-btn:hover{background:var(--surface-2);color:var(--fg);border-color:var(--border)}
  .icon-btn:active{transform:scale(.9)}
  .icon-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .icon-btn svg{width:18px;height:18px}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
  .grid{display:grid;gap:16px}

  /* ---------- Balance feature panel (the bank account) ---------- */
  .balance{background:
      radial-gradient(120% 140% at 100% 0%, oklch(0.74 0.165 158 / 0.13), transparent 55%),
      var(--surface);
    border:1px solid var(--border);border-radius:18px;padding:26px 28px;
    display:grid;grid-template-columns:1.5fr 1fr;gap:30px;align-items:center;margin-bottom:20px}
  .balance .lead .k{font-size:13px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:.06em;
    display:flex;align-items:center;gap:8px}
  .balance .lead .k svg{width:15px;height:15px;color:var(--accent)}
  .balance .lead .amount{font-family:'Poppins';font-weight:700;font-size:clamp(34px,6vw,46px);
    line-height:1.05;margin:10px 0 16px;letter-spacing:-.025em}
  .balance .meter{height:8px;border-radius:99px;background:var(--surface-3);overflow:hidden}
  .balance .meter > span{display:block;height:100%;border-radius:99px;background:var(--accent);
    transition:width .7s var(--ease)}
  .balance .meter-cap{display:flex;justify-content:space-between;font-size:12.5px;color:var(--text-dim);margin-top:8px}
  .balance .side{display:flex;flex-direction:column;gap:14px;border-left:1px solid var(--border);padding-left:30px}
  .balance .side .row .k{font-size:12.5px;color:var(--text-dim);font-weight:600}
  .balance .side .row .v{font-family:'Poppins';font-weight:700;font-size:21px;margin-top:3px;letter-spacing:-.02em}

  /* ---------- Inline stat strip (not a card grid) ---------- */
  .strip{display:flex;flex-wrap:wrap;gap:0;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
  .strip .cell{flex:1;min-width:150px;padding:16px 20px;border-right:1px solid var(--border)}
  .strip .cell:last-child{border-right:none}
  .strip .cell .k{font-size:12px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
  .strip .cell .v{font-family:'Poppins';font-weight:700;font-size:22px;margin-top:6px;letter-spacing:-.02em}
  .strip .cell .s{font-size:12px;color:var(--text-dimmer);margin-top:4px}

  .section-head{display:flex;align-items:center;justify-content:space-between;margin:4px 2px 14px;gap:14px}
  .section-head h3{font-size:16px}
  .section-head .sub{font-size:13px;color:var(--text-dim)}
  .two-col{grid-template-columns:1.12fr 1fr}

  /* ---------- Donut ---------- */
  .donut-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
  .donut{position:relative;width:172px;height:172px;flex:none}
  .donut .center{position:absolute;inset:0;display:grid;place-content:center;text-align:center}
  .donut .center .t{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
  .donut .center .v{font-family:'Poppins';font-weight:700;font-size:19px;margin-top:3px;letter-spacing:-.02em}
  .legend{display:flex;flex-direction:column;gap:11px;flex:1;min-width:180px}
  .legend-row{display:flex;align-items:center;gap:10px;font-size:13.5px}
  .legend-row .dot{width:10px;height:10px;border-radius:3px;flex:none}
  .legend-row .nm{color:var(--fg);font-weight:500}
  .legend-row .amt{margin-left:auto;color:var(--fg);font-weight:600}
  .legend-row .pct{color:var(--text-dimmer);font-size:12px;width:40px;text-align:right}

  /* ---------- Bars ---------- */
  .bars{display:flex;align-items:flex-end;gap:10px;height:172px;padding-top:10px}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;min-width:0;height:100%;justify-content:flex-end}
  .bar{width:100%;max-width:44px;border-radius:7px 7px 3px 3px;
    background:linear-gradient(180deg,var(--accent),oklch(0.55 0.13 160));
    transition:height .6s var(--ease);position:relative}
  .bar:hover{filter:brightness(1.12)}
  .bar-label{font-size:11px;color:var(--text-dim);white-space:nowrap;font-weight:600}
  .bar-val{font-size:10.5px;color:var(--text-dimmer);white-space:nowrap}

  /* ---------- Table ---------- */
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
  .search{position:relative;flex:1;min-width:200px}
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--text-dim)}
  .search input{width:100%;padding:10px 12px 10px 38px;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius-sm);color:var(--fg);outline:none;transition:border .18s}
  .search input:focus{border-color:var(--accent)}
  select.filter{padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
    color:var(--fg);outline:none;cursor:pointer}
  select.filter:focus{border-color:var(--accent)}

  .tbl{width:100%;border-collapse:collapse}
  .tbl th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-dim);
    font-weight:700;padding:11px 14px;border-bottom:1px solid var(--border)}
  .tbl td{padding:14px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle}
  .tbl tr:last-child td{border-bottom:none}
  .tbl tr.row{transition:background .15s}
  .tbl tr.row:hover{background:var(--surface-2)}
  .tbl .amt{font-weight:700;text-align:right;white-space:nowrap}
  .tbl .actions{text-align:right;white-space:nowrap}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}
  .pill .dot{width:7px;height:7px;border-radius:50%}
  .empty{text-align:center;padding:56px 20px;color:var(--text-dim)}
  .empty svg{width:46px;height:46px;color:var(--text-dimmer);margin-bottom:14px}
  .empty h4{font-size:16px;color:var(--fg);margin-bottom:6px}
  .empty p{font-size:14px;max-width:360px;margin:0 auto 18px;line-height:1.6}
  .note-cell{color:var(--text-dim);font-size:12.5px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .amt-out{color:oklch(0.78 0.16 25)}
  .amt-in{color:var(--accent)}

  /* ---------- Modal ---------- */
  .scrim{position:fixed;inset:0;background:oklch(0.12 0.02 165 / 0.6);backdrop-filter:blur(3px);z-index:100;
    display:grid;place-items:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
  .scrim.open{opacity:1;pointer-events:auto}
  .modal{background:var(--surface);border:1px solid var(--border-strong);border-radius:18px;width:100%;max-width:520px;
    box-shadow:var(--shadow);transform:translateY(14px) scale(.98);transition:transform .26s var(--ease);
    max-height:90dvh;display:flex;flex-direction:column}
  .scrim.open .modal{transform:none}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 14px}
  .modal-head h3{font-size:18px}
  .modal-body{padding:4px 22px 8px;overflow-y:auto}
  .modal-foot{padding:16px 22px 20px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--border);margin-top:6px}
  .field{margin-bottom:15px}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--fg);margin-bottom:7px}
  .field label .req{color:oklch(0.72 0.18 25)}
  .field .hint{font-size:12px;color:var(--text-dim);margin-top:6px;line-height:1.5}
  .field input,.field select,.field textarea{width:100%;padding:11px 13px;background:var(--bg);
    border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--fg);outline:none;transition:border .18s}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
  .field .errmsg{color:oklch(0.72 0.18 25);font-size:12px;margin-top:6px;display:none}
  .field .errmsg.show{display:block}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .cat-chips{display:flex;flex-wrap:wrap;gap:8px}
  .cat-chip{padding:8px 12px;border-radius:999px;border:1px solid var(--border);font-size:13px;font-weight:600;
    color:var(--text-dim);transition:all .15s;display:inline-flex;align-items:center;gap:7px}
  .cat-chip .dot{width:9px;height:9px;border-radius:50%}
  .cat-chip:hover{border-color:var(--border-strong);color:var(--fg)}
  .cat-chip.sel{color:var(--fg);background:var(--surface-2);border-color:var(--border-strong)}
  .lineitem{display:grid;grid-template-columns:1fr 130px 36px;gap:9px;margin-bottom:9px;align-items:start}
  .li-total{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--surface-2);
    border-radius:var(--radius-sm);margin-top:4px;font-weight:600}
  .li-total .v{font-family:'Poppins';font-weight:700;font-size:17px;color:var(--accent)}
  .link-add{color:var(--accent);font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:6px;padding:6px 0}
  .rcpt-chip{display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;margin-left:7px;width:24px;height:24px;
    border-radius:7px;background:var(--accent-soft);color:var(--accent);transition:background .15s}
  .rcpt-chip:hover{background:oklch(0.74 0.165 158 / .24)}
  .rcpt-prev{display:flex;gap:12px;align-items:center}
  .rcpt-prev img{width:64px;height:64px;object-fit:cover;border-radius:10px;border:1px solid var(--border);flex:none}
  .rcpt-actions{display:flex;gap:7px;flex-wrap:wrap}
  .pager{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:16px;flex-wrap:wrap}
  .pager-nums{display:flex;align-items:center;gap:5px;flex-wrap:wrap;justify-content:center}
  .pager-num{min-width:34px;height:34px;padding:0 8px;border-radius:9px;font-weight:600;font-size:13.5px;
    color:var(--text-dim);background:var(--surface-2);border:1px solid var(--border);transition:background .15s,color .15s,border-color .15s}
  .pager-num:hover{background:var(--surface-3);color:var(--fg);border-color:var(--border-strong)}
  .pager-num.active{background:var(--accent);color:var(--on-accent);border-color:transparent;cursor:default}
  .pager-gap{min-width:24px;text-align:center;color:var(--text-dimmer);font-weight:600;user-select:none}

  /* ---------- Fund page rows ---------- */
  .fund-row{display:flex;align-items:center;gap:14px;padding:15px 4px;border-bottom:1px solid var(--border)}
  .fund-row:last-child{border-bottom:none}
  .fund-row .ic{width:38px;height:38px;border-radius:11px;background:var(--accent-soft);display:grid;place-items:center;flex:none}
  .fund-row .ic svg{width:19px;height:19px;color:var(--accent)}
  .fund-row .meta{flex:1;min-width:0}
  .fund-row .meta .t{font-weight:600}
  .fund-row .meta .d{font-size:12.5px;color:var(--text-dim);margin-top:2px}
  .fund-row .v{font-family:'Poppins';font-weight:700;color:var(--accent);white-space:nowrap}
  .fund-row .meta .t{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .fund-row .meta .t .tag{font-size:11px;font-weight:600;color:var(--text-dim);background:var(--surface-3);
    border:1px solid var(--border);padding:2px 8px;border-radius:99px}
  .split-bar{display:flex;gap:3px;height:15px;border-radius:99px;overflow:hidden;
    margin:6px 0 22px;background:var(--surface-3)}
  .split-bar .seg{min-width:5px;transition:flex .55s var(--ease)}
  .part-list{list-style:none;display:flex;flex-direction:column;gap:1px}
  .part-row{display:flex;align-items:center;gap:13px;padding:9px 7px;border-radius:12px;
    transition:background .16s var(--ease)}
  .part-row:hover{background:var(--surface-3)}
  .part-row .ava{width:35px;height:35px;border-radius:50%;flex:none;display:grid;place-items:center;
    font-weight:700;font-size:13px;letter-spacing:.3px;color:var(--c);
    background:color-mix(in oklch, var(--c) 16%, transparent);
    border:1px solid color-mix(in oklch, var(--c) 38%, transparent)}
  .part-row .nm{font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .part-row .amt{font-family:'Poppins';font-weight:700;white-space:nowrap}
  .part-row .pc{font-family:'Poppins';font-weight:600;font-size:13px;width:48px;text-align:right}

  /* ---------- Toast ---------- */
  .toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;display:flex;
    flex-direction:column;gap:9px;align-items:center;pointer-events:none}
  .toast{background:var(--surface-2);border:1px solid var(--border-strong);border-radius:11px;padding:12px 18px;
    font-size:14px;font-weight:600;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;
    animation:toastIn .32s var(--ease);pointer-events:auto}
  .toast svg{width:18px;height:18px;flex:none}

/* ---- Receipt photos (compress in browser, store in Supabase Storage) ---- */
function compressImage(file, maxDim=1500, quality=0.72){
  return new Promise((resolve,reject)=>{
    const url=URL.createObjectURL(file); const img=new Image();
    img.onload=()=>{
      let w=img.width, h=img.height;
      if(w>h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
      else if(h>=w && h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      c.toBlob(b=> b?resolve(b):reject(new Error('compress failed')), 'image/jpeg', quality);
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); reject(new Error('not an image')); };
    img.src=url;
  });
}
async function uploadReceipt(file){
  if(!sb) throw new Error('Photos need the cloud connection');
  const blob = file.type==='image/jpeg' && file.size<400000 ? file : await compressImage(file);
  const path = uid()+'.jpg';
  const {error} = await sb.storage.from('receipts').upload(path, blob, {contentType:'image/jpeg', upsert:false});
  if(error) throw error;
  return sb.storage.from('receipts').getPublicUrl(path).data.publicUrl;
}

function fmtDate(d){ const dt=new Date(d+'T00:00:00'); if(isNaN(dt)) return d;
  return dt.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function parseLocalDate(dateStr){
  const [y,m,d] = String(dateStr).split('-').map(Number);
  return new Date(y, (m||1)-1, d||1);
}
function matchesExpensePeriod(dateStr, period){
  if(period==='all') return true;
  const today = new Date();
  const todayKey = todayStr();
  if(period==='today') return dateStr===todayKey;
  if(period==='month') return String(dateStr).slice(0,7)===todayKey.slice(0,7);
  if(period==='week'){
    const now = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const offset = (now.getDay()+6)%7;
    const weekStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()-offset);
    const weekEnd = new Date(weekStart.getFullYear(), weekStart.getMonth(), weekStart.getDate()+7);
    const value = parseLocalDate(dateStr);
    return value>=weekStart && value<weekEnd;
  }
  return true;
}

function renderNav(){
  const html = NAV.map(n=>
    `<button data-route="${n.id}" class="${route===n.id?'active':''}" aria-label="${n.label}">${svg(n.icon)}<span>${n.label}</span></button>`).join('');
  $('#navDesktop').innerHTML = html;
  $('#navMobile').innerHTML = html;
  document.querySelectorAll('[data-route]').forEach(b=>b.onclick=()=>go(b.dataset.route));
}
function go(r){ route=r; filters={q:'',cat:'',period:'all',sort:'newest',page:1}; renderNav(); render(); window.scrollTo(0,0); }

/* ===================== Router ===================== */
const TITLES={dashboard:'Dashboard',expenses:'Expenses',engineer:'Engineer Expenses',fund:'Fund & Deposits',settings:'Settings',deleted:'Deleted Expenses'};
function render(){
  $('#pageTitle').textContent = TITLES[route];
  $('#brandName').textContent = state.projectName;
  updateTopbarAction();
  if(route==='dashboard') renderDashboard();
  else if(route==='expenses') renderExpenses();
  else if(route==='engineer') renderEngineer();
  else if(route==='fund') renderFund();
  else if(route==='settings') renderSettings();
  else if(route==='deleted') renderDeleted();
}
function updateTopbarAction(){
  const ab=$('#addBtn'); if(!ab) return;
  const lbl=ab.querySelector('span.hide-sm');
  if(route==='deleted'){ ab.style.display='none'; return; }
  ab.style.display='';
  if(route==='engineer'){ if(lbl) lbl.textContent='Add Engineer Cost'; ab.onclick=openEngineerAddModal; }
  else { if(lbl) lbl.textContent='Add Expense'; ab.onclick=openAddModal; }
}

/* ===================== Dashboard ===================== */
function renderDashboard(){
  const exp = activeExpenses();
  const fund = totalFund(), spent = totalSpent(), bal = balance();
  const usedPct = fund>0 ? Math.min(100, spent/fund*100) : (spent>0?100:0);
  const _n=new Date(); const nowM=_n.getFullYear()+'-'+String(_n.getMonth()+1).padStart(2,'0');
  const thisMonth = exp.filter(e=>e.date.slice(0,7)===nowM).reduce((s,e)=>s+e.amount,0);
  const count = exp.length;

  // Balance panel always shows (the fund exists from day one)
  const balPanel = `
    <section class="balance">
      <div class="lead">
        <div class="k">${svg(I.wallet)} Available Balance</div>
        <div class="amount tnum" style="${bal<0?'color:oklch(0.72 0.18 25)':''}">${cur(bal)}</div>
        <div class="meter"><span style="width:${usedPct}%;${bal<0?'background:oklch(0.64 0.2 25)':''}"></span></div>
        <div class="meter-cap"><span>${Math.round(usedPct)}% of fund used</span><span>${cur(spent)} spent</span></div>
      </div>
      <div class="side">
        <div class="row"><div class="k">Total Fund</div><div class="v tnum">${cur(fund)}</div></div>
        <div class="row"><div class="k">Total Spent</div><div class="v tnum">${cur(spent)}</div></div>
      </div>
    </section>`;

  if(count===0){
    $('#view').innerHTML = balPanel + emptyState('No expenses logged yet',
      'Your fund is set. Add your first expense, pipes, labor, tractor, anything, and it deducts from the balance above automatically.',
      'Add your first expense');
    $('#view').querySelector('.empty .btn').onclick=openAddModal;
    return;
  }

  // category totals
  const catTot={}; CATEGORIES.forEach(c=>catTot[c.id]=0);
  exp.forEach(e=>catTot[e.category]=(catTot[e.category]||0)+e.amount);
  const catData = CATEGORIES.map(c=>({...c,amt:catTot[c.id]})).filter(c=>c.amt>0).sort((a,b)=>b.amt-a.amt);

  // last 6 months (local components — avoid UTC shift)
  const months=[]; const base=new Date();
  for(let i=5;i>=0;i--){ const d=new Date(base.getFullYear(),base.getMonth()-i,1);
    const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    months.push({key,label:d.toLocaleDateString('en-GB',{month:'short'})}); }
  const monthTot=months.map(m=>({...m,amt:exp.filter(e=>e.date.slice(0,7)===m.key).reduce((s,e)=>s+e.amount,0)}));
  const maxM=Math.max(...monthTot.map(m=>m.amt),1);

  const recent=[...exp].sort((a,b)=> b.date.localeCompare(a.date) || b.createdAt-a.createdAt).slice(0,6);

  $('#view').innerHTML = balPanel + `
    <div class="strip">
      ${stripCell('This Month', cur(thisMonth), monthTot[5].label+' '+new Date().getFullYear())}
      ${stripCell('Transactions', count.toLocaleString('en-IN'), 'expenses logged')}
      ${stripCell('Avg / Entry', cur(count?spent/count:0), 'per transaction')}
      ${stripCell('Biggest Category', catData[0]?catData[0].name:'—', catData[0]?cur(catData[0].amt):'')}
    </div>

    <div class="grid two-col" style="margin-bottom:20px">
      <div class="card">
        <div class="section-head"><h3>Spending by Category</h3></div>
        <div class="donut-wrap">
          ${donut(catData, spent)}
          <div class="legend">
            ${catData.map(c=>`<div class="legend-row">
              <span class="dot" style="background:${c.hex}"></span>
              <span class="nm">${c.name}</span>
              <span class="amt tnum">${cur(c.amt)}</span>
              <span class="pct tnum">${Math.round(c.amt/spent*100)}%</span>
            </div>`).join('')}
          </div>
        </div>
      </div>
      <div class="card">
        <div class="section-head"><h3>Monthly Spend</h3></div>
        <div class="bars">
          ${monthTot.map(m=>{
            const h = m.amt? Math.max(6, m.amt/maxM*128) : 3;
            return `<div class="bar-col">
              <div class="bar-val tnum">${m.amt? (m.amt>=1000?(m.amt/1000).toFixed(1)+'k':m.amt) : ''}</div>
              <div class="bar" style="height:${h}px;${m.amt?'':'opacity:.22'}" title="${m.label}: ${cur(m.amt)}"></div>
              <div class="bar-label">${m.label}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-head">
        <h3>Recent Expenses</h3>
        <button class="btn btn-ghost btn-sm" id="seeAll">View all ${svg(I.arrow)}</button>
      </div>
      <table class="tbl"><thead><tr>
        <th>Date</th><th>Item</th><th>Category</th><th>Note</th><th style="text-align:right">Amount</th>
      </tr></thead><tbody>
        ${recent.map(e=>`<tr class="row">
          <td data-l="Date">${fmtDate(e.date)}</td>
          <td data-l="Item"><strong>${esc(e.item)}</strong>${e.receiptUrl?` <button class="rcpt-chip" data-rcpt="${esc(e.receiptUrl)}" title="View bill photo" aria-label="View bill photo">${svg(I.camera,'width="13" height="13"')}</button>`:''}</td>
          <td data-l="Category">${catPill(e.category)}</td>
          <td data-l="Note" class="note-cell" title="${esc(e.note||'')}">${esc(e.note||'—')}</td>
          <td class="amt tnum amt-out" data-l="Amount">- ${cur(e.amount)}</td>
        </tr>`).join('')}
      </tbody></table>
    </div>
  `;
  $('#seeAll').onclick=()=>go('expenses');
}
function stripCell(k,v,s){ return `<div class="cell"><div class="k">${k}</div><div class="v tnum">${v}</div><div class="s">${s}</div></div>`; }
// Page numbers to show. Show every page when there aren't many;
// only collapse with '…' gaps for large counts (e.g. 1 … 4 5 6 … 20).
function pagerItems(current,total){
  if(total<=7){ return Array.from({length:total},(_,i)=>i+1); }
  const range=[]; for(let i=Math.max(2,current-1); i<=Math.min(total-1,current+1); i++) range.push(i);
  const items=[1];
  if(range[0]>2) items.push('…');
  items.push(...range);
  if(range[range.length-1]<total-1) items.push('…');
  items.push(total);
  return items;
}

function donut(data, tot){
  const R=70, C=2*Math.PI*R; let off=0;
  const segs = (tot>0?data:[]).map(d=>{
    const frac=d.amt/tot, len=frac*C;
    const s=`<circle r="${R}" cx="86" cy="86" fill="none" stroke="${d.hex}" stroke-width="22"
      stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 86 86)"/>`;
    off+=len; return s;
  }).join('');
  return `<div class="donut">
    <svg width="172" height="172" viewBox="0 0 172 172" role="img" aria-label="Spending by category, total ${cur(tot)}">
      <circle r="${R}" cx="86" cy="86" fill="none" stroke="var(--surface-3)" stroke-width="22"/>
      ${segs}
    </svg>
    <div class="center"><div class="t">Spent</div><div class="v tnum">${cur(tot)}</div></div>
  </div>`;
}

/* ===================== Expenses ===================== */
const EXP_SORTERS={
  newest:(a,b)=> b.date.localeCompare(a.date) || b.createdAt-a.createdAt,
  oldest:(a,b)=> a.date.localeCompare(b.date) || a.createdAt-b.createdAt,
  high:(a,b)=> b.amount-a.amount || b.date.localeCompare(a.date),
  low:(a,b)=> a.amount-b.amount || b.date.localeCompare(a.date),
};
function renderExpenses(){
  let list=activeExpenses().sort(EXP_SORTERS[filters.sort]||EXP_SORTERS.newest);
  const q=filters.q.toLowerCase();
  if(q) list=list.filter(e=>(e.item+' '+(e.note||'')).toLowerCase().includes(q));
  if(filters.cat) list=list.filter(e=>e.category===filters.cat);
  if(filters.period) list=list.filter(e=>matchesExpensePeriod(e.date, filters.period));
  const shownTotal = list.reduce((s,e)=>s+e.amount,0);
  const active = filters.q||filters.cat||filters.period!=='all';
  const delCount = deletedExpenses().length;
  const totalEntries = list.length;
  const totalPages = Math.max(1, Math.ceil(totalEntries / EXPENSES_PER_PAGE));
  filters.page = Math.min(Math.max(filters.page, 1), totalPages);
  const pageStart = totalEntries ? ((filters.page - 1) * EXPENSES_PER_PAGE) + 1 : 0;
  const pageEnd = Math.min(filters.page * EXPENSES_PER_PAGE, totalEntries);
  const pageList = list.slice(pageStart ? pageStart - 1 : 0, pageEnd);

  $('#view').innerHTML = `
    <div class="toolbar">
      <div class="search">${svg(I.search)}<input id="q" placeholder="Search item or note…" value="${esc(filters.q)}" aria-label="Search expenses"/></div>
      <select class="filter" id="fcat" aria-label="Filter by category">
        <option value="">All categories</option>
        ${CATEGORIES.map(c=>`<option value="${c.id}" ${filters.cat===c.id?'selected':''}>${c.name}</option>`).join('')}
      </select>
      <select class="filter" id="fperiod" aria-label="Filter by time period">
        <option value="all" ${filters.period==='all'?'selected':''}>All time</option>
        <option value="today" ${filters.period==='today'?'selected':''}>Today</option>
        <option value="week" ${filters.period==='week'?'selected':''}>This week</option>
        <option value="month" ${filters.period==='month'?'selected':''}>This month</option>
      </select>
      <select class="filter" id="fsort" aria-label="Sort expenses">
        <option value="newest" ${filters.sort==='newest'?'selected':''}>Newest first</option>
        <option value="oldest" ${filters.sort==='oldest'?'selected':''}>Oldest first</option>
        <option value="high" ${filters.sort==='high'?'selected':''}>Amount: high to low</option>
        <option value="low" ${filters.sort==='low'?'selected':''}>Amount: low to high</option>
      </select>
      <button class="btn btn-ghost btn-sm" id="goDeleted">${svg(I.trash)} Deleted${delCount?' ('+delCount+')':''}</button>
    </div>

    ${totalEntries? `<div class="card" style="padding:6px 6px">
      <table class="tbl"><thead><tr>
        <th>Date</th><th>Item</th><th>Category</th><th>Note</th>
        <th style="text-align:right">Amount</th><th></th>
      </tr></thead><tbody>
        ${pageList.map(e=>`<tr class="row">
          <td data-l="Date">${fmtDate(e.date)}</td>
          <td data-l="Item"><strong>${esc(e.item)}</strong>${e.receiptUrl?` <button class="rcpt-chip" data-rcpt="${esc(e.receiptUrl)}" title="View bill photo" aria-label="View bill photo">${svg(I.camera,'width="13" height="13"')}</button>`:''}</td>
          <td data-l="Category">${catPill(e.category)}</td>
          <td data-l="Note" class="note-cell" title="${esc(e.note||'')}">${esc(e.note||'—')}</td>
          <td class="amt tnum amt-out" data-l="Amount">- ${cur(e.amount)}</td>
          <td class="actions" data-l="">
            <button class="icon-btn" data-edit="${e.id}" aria-label="Edit ${esc(e.item)}">${svg(I.edit)}</button>
            <button class="icon-btn" data-del="${e.id}" aria-label="Delete ${esc(e.item)}">${svg(I.trash)}</button>
          </td>
        </tr>`).join('')}
      </tbody></table>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding:0 4px;color:var(--text-dim);font-size:14px">
      <span>Showing ${pageStart}-${pageEnd} of ${totalEntries} ${totalEntries===1?'entry':'entries'}${active?' (filtered)':''}</span>
      <span>Shown total: <strong style="color:var(--fg)" class="tnum">${cur(shownTotal)}</strong></span>
    </div>
    ${totalPages>1? `<div class="pager">
      <button class="btn btn-ghost btn-sm" id="prevPage" ${filters.page===1?'style="opacity:.4;pointer-events:none"':''}>Prev</button>
      <div class="pager-nums">
        ${pagerItems(filters.page,totalPages).map(p=> p==='…'
          ? `<span class="pager-gap">…</span>`
          : `<button class="pager-num${p===filters.page?' active':''}" data-page="${p}" aria-label="Go to page ${p}" ${p===filters.page?'aria-current="page"':''}>${p}</button>`).join('')}
      </div>
      <button class="btn btn-ghost btn-sm" id="nextPage" ${filters.page===totalPages?'style="opacity:.4;pointer-events:none"':''}>Next</button>
    </div>` : ''}`
    : emptyState(active?'No matching expenses':'No expenses yet', active?'Try clearing the search or filter.':'Add your first expense to get started.', active?null:'Add expense')}
  `;

  const qi=$('#q'); if(qi){ qi.oninput=()=>{filters.q=qi.value; filters.page=1; const p=qi.selectionStart; renderExpenses(); const nn=$('#q'); nn.focus(); nn.setSelectionRange(p,p);}; }
  if($('#fcat')) $('#fcat').onchange=e=>{filters.cat=e.target.value; filters.page=1; renderExpenses();};
  if($('#fperiod')) $('#fperiod').onchange=e=>{filters.period=e.target.value; filters.page=1; renderExpenses();};
  if($('#fsort')) $('#fsort').onchange=e=>{filters.sort=e.target.value; filters.page=1; renderExpenses();};
  if($('#goDeleted')) $('#goDeleted').onclick=()=>go('deleted');
  if($('#prevPage')) $('#prevPage').onclick=()=>{ if(filters.page>1){ filters.page--; renderExpenses(); window.scrollTo(0,0); } };
  if($('#nextPage')) $('#nextPage').onclick=()=>{ if(filters.page<totalPages){ filters.page++; renderExpenses(); window.scrollTo(0,0); } };
  document.querySelectorAll('[data-page]').forEach(b=>b.onclick=()=>{ const p=+b.dataset.page; if(p!==filters.page){ filters.page=p; renderExpenses(); window.scrollTo(0,0); } });
  document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openEditModal(b.dataset.edit));
  document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>confirmDelete(b.dataset.del));
  const addEmpty=$('#view').querySelector('.empty .btn'); if(addEmpty) addEmpty.onclick=openAddModal;
}

async function saveExpense(category){
  const date=$('#mDate').value;
  const note=$('#mNote').value.trim();
  let ok=true;
  $('#errDate').classList.toggle('show', !date); if(!date) ok=false;
  const valid=lineItems.map(l=>({item:l.item.trim(),amount:parseFloat(l.amount)})).filter(l=>l.item && l.amount>0);
  $('#errItems').classList.toggle('show', valid.length===0); if(valid.length===0) ok=false;
  if(!ok){ toast('Please complete the required fields','err'); return; }

  const isEng=modalMode==='engineer';
  const arr=isEng?state.engineerExpenses:state.expenses;
  const table=isEng?'engineer_expenses':'expenses';
  const rowFn=isEng?engRow:expRow;
  const noun=isEng?'Engineer cost':'Expense';

  // upload a freshly chosen receipt photo first (main expenses only)
  let finalReceipt = isEng ? null : receiptUrl;
  if(!isEng && receiptFile){
    const btn=$('#mSave'); if(btn){ btn.disabled=true; btn.style.opacity='.6'; btn.innerHTML=svg(I.camera)+' Uploading photo…'; }
    try{ finalReceipt = await uploadReceipt(receiptFile); }
    catch(err){ console.error(err); if(btn){ btn.disabled=false; btn.style.opacity=''; btn.innerHTML=svg(I.check)+' '+(editingId?'Save changes':'Add expense'); }
      toast('Photo upload failed — check connection','err'); return; }
  }

  if(editingId){
    const e=arr.find(x=>x.id===editingId);
    e.date=date; e.category=category; e.note=note; e.item=valid[0].item; e.amount=valid[0].amount;
    if(!isEng) e.receiptUrl=finalReceipt;
    save(); cloudPush(table,rowFn(e)); closeModal(); render(); toast(noun+' updated');
  }else{
    const added=valid.map(v=>({id:uid(), date, category, note, item:v.item, amount:v.amount, createdAt:Date.now(), receiptUrl:isEng?undefined:finalReceipt}));
    added.forEach(e=>arr.push(e));
    save(); cloudPush(table,added.map(rowFn)); closeModal(); render();
    toast(valid.length>1? valid.length+' items added' : noun+' added');
  }
}

/* ===================== Export / Import ===================== */
function download(name,content,type){
  const blob=new Blob([content],{type});
  // Older Edge/IE
  if(window.navigator && window.navigator.msSaveOrOpenBlob){ window.navigator.msSaveOrOpenBlob(blob,name); return; }
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=name; a.rel='noopener'; a.style.display='none';
  document.body.appendChild(a);   // must be in the DOM to click reliably (iOS Safari, Firefox)
  a.click();
  setTimeout(()=>{ if(a.parentNode) a.parentNode.removeChild(a); URL.revokeObjectURL(url); },1500);
}
function exportJSON(){
  download(`futsal-ledger-${todayStr()}.json`, JSON.stringify(state,null,2), 'application/json');
  toast('Backup exported');
}
function exportCSV(){
  const rows=[['Type','Date','Item/Note','Category','Amount']];
  [...state.deposits].sort((a,b)=>a.date.localeCompare(b.date)).forEach(d=>
    rows.push(['Deposit', d.date, depName(d)+(d.note?' ('+d.note+')':''), d.method||'', d.amount]));
  activeExpenses().sort((a,b)=>a.date.localeCompare(b.date)).forEach(e=>
    rows.push(['Expense', e.date, e.item+(e.note?' ('+e.note+')':''), catOf(e.category).name, -e.amount]));
  [...(state.engineerExpenses||[])].sort((a,b)=>a.date.localeCompare(b.date)).forEach(e=>
    rows.push(['Engineer', e.date, e.item+(e.note?' ('+e.note+')':''), catOf(e.category).name, e.amount]));
  deletedExpenses().sort((a,b)=>a.date.localeCompare(b.date)).forEach(e=>
    rows.push(['Deleted', e.date, e.item+(e.note?' ('+e.note+')':''), catOf(e.category).name, e.amount]));
  const csv=rows.map(r=>r.map(c=>{const s=String(c); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}).join(',')).join('\n');
  download(`futsal-ledger-${todayStr()}.csv`, csv, 'text/csv');
  toast('CSV exported');
}
function importJSON(ev){
  const file=ev.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const data=JSON.parse(reader.result);
      if(!Array.isArray(data.expenses)||!Array.isArray(data.deposits)) throw new Error('bad');
      state=data; state.currency=state.currency||'Rs';
      state.engineerExpenses=Array.isArray(data.engineerExpenses)?data.engineerExpenses:[];
      save(); cloudReplaceAll(); go('dashboard'); toast('Data imported');
    }catch(err){ toast('Invalid backup file','err'); }
  };
  reader.readAsText(file); ev.target.value='';
}

/* ===================== Password gate ===================== */
/* Only people with the password can open the app. To change the password,
   ask for a new SHA-256 hash and replace the value below.                */
const APP_PASS_HASH = 'a89d43db39b3e09c95ebe625791824a547ed79ed401530c94cb443c0bfb4ba18';
const UNLOCK_KEY = 'futsalLedger.unlocked';

async function sha256(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

    <div style="width:100%;max-width:340px;text-align:center">
      <div style="width:54px;height:54px;border-radius:15px;background:var(--accent);display:grid;place-items:center;margin:0 auto 18px;box-shadow:0 6px 18px oklch(0.74 0.165 158 / .35);color:var(--on-accent)">
        ${svg('<rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4" stroke-linecap="round"/>')}
      </div>
      <h2 style="font-family:'Poppins';font-weight:600;font-size:22px">${esc(state.projectName)}</h2>
      <p style="color:var(--text-dim);font-size:14px;margin:7px 0 20px">Enter the password to continue</p>
      <input id="gatePw" type="password" inputmode="text" autocomplete="current-password" placeholder="Password"
        style="width:100%;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:11px;color:var(--fg);outline:none;text-align:center;font-size:16px"/>
      <div id="gateErr" style="color:oklch(0.72 0.18 25);font-size:13px;margin-top:10px;display:none">Wrong password, try again</div>
      <button id="gateBtn" class="btn btn-primary" style="width:100%;margin-top:14px;justify-content:center">Unlock</button>
    </div>`;
  document.body.appendChild(g);
  const inp=g.querySelector('#gatePw'), btn=g.querySelector('#gateBtn'), err=g.querySelector('#gateErr');
  async function attempt(){
    const h=await sha256(inp.value);
    if(h===APP_PASS_HASH){ localStorage.setItem(UNLOCK_KEY,'1'); g.remove(); startApp(); }
    else { err.style.display='block'; inp.value=''; inp.focus(); }
  }
  btn.onclick=attempt;
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') attempt(); });
  setTimeout(()=>inp.focus(),100);
}

/* ===================== Boot ===================== */
if(localStorage.getItem(UNLOCK_KEY)==='1') startApp();
else buildGate();
</script>
</body>
</html>
